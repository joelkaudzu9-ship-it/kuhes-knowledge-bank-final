services:
  - type: web
    name: kuhes-knowledge-bank
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn kuhes_kb.wsgi --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kuhes-knowledge-bank-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: PORT
        value: 10000

databases:
  - name: kuhes-knowledge-bank-db
    databaseName: kuhes_db
    user: kuhes_user