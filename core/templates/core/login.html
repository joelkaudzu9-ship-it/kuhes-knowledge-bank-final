{% extends 'core/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary-blue text-white">
                    <h4 class="mb-0"><i class="fas fa-sign-in-alt me-2"></i>Login to KUHeS Knowledge Bank</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="id_username" class="form-label">Email</label>
                            <input type="email" name="username" id="id_username" class="form-control" required>
                            <small class="form-text text-muted">Use your @kuhes.ac.mw email</small>
                        </div>

                        <div class="mb-3">
                            <label for="id_password" class="form-label">Password</label>
                            <input type="password" name="password" id="id_password" class="form-control" required>
                        </div>

                        <div class="text-end mb-3">
                            <a href="{% url 'forgot_password' %}" class="text-muted small">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>
                    </form>

                    <p class="text-center mt-3">
                        <a href="{% url 'resend_verification' %}" class="text-muted small">Didn't receive verification email?</a>
                    </p>

                    <hr>

                    <p class="text-center mb-0">
                        Don't have an account?
                        <a href="{% url 'register' %}" class="text-primary-blue">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
