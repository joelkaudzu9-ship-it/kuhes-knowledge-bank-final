{% extends 'core/base.html' %}

{% block title %}Home{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-12 text-center">
            <h1 class="display-4 mb-4">Welcome to KUHeS Knowledge Bank</h1>
            <p class="lead">Your centralized platform for academic resources</p>

            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="btn btn-primary btn-lg mt-3">
                    Go to Dashboard
                </a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-primary btn-lg mt-3 me-2">
                    Login
                </a>
                <a href="{% url 'register' %}" class="btn btn-success btn-lg mt-3">
                    Register
                </a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
