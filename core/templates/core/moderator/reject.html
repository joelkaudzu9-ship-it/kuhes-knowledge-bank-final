{% extends 'core/base.html' %}

{% block title %}Reject Resource{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0"><i class="fas fa-times-circle me-2"></i>Reject Resource</h5>
                </div>
                <div class="card-body">
                    <p>You are about to reject:</p>
                    <h6>{{ resource.title }}</h6>
                    <p class="text-muted small">Uploaded by: {{ resource.uploader.username }}</p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="reason" class="form-label">Reason for rejection</label>
                            <textarea name="reason" id="reason" class="form-control" rows="4" required></textarea>
                            <small class="text-muted">This will be sent to the uploader.</small>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-times me-2"></i>Reject Resource
                            </button>
                            <a href="{% url 'moderator_dashboard' %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
